apiVersion: v1
kind: Pod
metadata:
  name: opencode-work
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  runtimeClassName: gvisor
  containers:
    - name: opencode
      image: ghcr.io/tom1299/agent-runtime/opencode-agent:latest
      imagePullPolicy: IfNotPresent
      command: ["sleep", "infinity"]
      stdin: true
      tty: true
      workingDir: /workspace
      env:
        - name: OPENCODE_ZEN_API_KEY
          value: "${OPENCODE_ZEN_API_KEY}"
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: repo
          mountPath: /workspace
  volumes:
    - name: repo
      hostPath:
        path: /workspace/${REPO_SUBDIR}
        type: Directory

